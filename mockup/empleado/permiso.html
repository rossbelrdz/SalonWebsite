  <body class="admin-body">

      <div class="admin-main">
        <header class="admin-topbar"><strong>Solicitar permiso / ausencia</strong></header>

                <textarea class="form-control" placeholder="Detalle breve"></textarea>
              </div>
              <button type="button" class="btn btn-primary" onclick="alert('Mock: solicitud enviada a admin. Citas prepagadas quedarán en flujo de reasignación.')">Enviar solicitud</button>

          </div>
